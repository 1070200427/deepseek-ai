<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .config-bar {
            padding: 12px 16px;
            background: #f7f7f7;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        #apiKeyInput {
            flex: 2;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            font-family: monospace;
        }
        
        #saveKeyBtn, #clearChatBtn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        #saveKeyBtn:active, #clearChatBtn:active {
            transform: scale(0.95);
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .loading {
            background: #f0f0f0;
            color: #999;
            align-self: flex-start;
            font-style: italic;
        }
        
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }
        
        #userInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            resize: none;
            font-family: inherit;
        }
        
        #sendBtn {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        #sendBtn:active {
            transform: scale(0.95);
        }
        
        #sendBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
            
            .container {
                height: 95vh;
            }
            
            .config-bar {
                flex-direction: column;
            }
            
            #apiKeyInput, #saveKeyBtn, #clearChatBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 DeepSeek AI 助手</h1>
        </div>
        
        <div class="config-bar">
            <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key" autocomplete="off">
            <button id="saveKeyBtn">💾 保存密钥</button>
            <button id="clearChatBtn">🗑️ 清空对话</button>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message ai-message">
                👋 你好！我是DeepSeek AI助手。请在上方输入你的API Key开始对话。
            </div>
        </div>
        
        <div class="input-area">
            <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.deepseek.com/v1/chat/completions';
        let apiKey = localStorage.getItem('deepseek_api_key') || '';
        
        // DOM 元素
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const clearChatBtn = document.getElementById('clearChatBtn');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let messages = [];
        
        // 加载保存的API Key
        if (apiKey) {
            apiKeyInput.value = '********';
            addSystemMessage('✅ API Key已加载，可以开始对话！');
        }
        
        // 保存API Key
        saveKeyBtn.addEventListener('click', () => {
            const newKey = apiKeyInput.value.trim();
            if (newKey && newKey !== '********') {
                apiKey = newKey;
                localStorage.setItem('deepseek_api_key', apiKey);
                apiKeyInput.value = '********';
                addSystemMessage('✅ API Key保存成功！');
                enableSending(true);
            } else if (apiKey) {
                addSystemMessage('✅ API Key已存在，无需重复保存');
            } else {
                addSystemMessage('⚠️ 请输入有效的API Key');
            }
        });
        
        // 清空对话
        clearChatBtn.addEventListener('click', () => {
            messages = [];
            chatArea.innerHTML = '';
            addSystemMessage('🗑️ 对话已清空，开始新对话吧！');
        });
        
        // 发送消息
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        async function sendMessage() {
            const userMessage = userInput.value.trim();
            if (!userMessage) return;
            
            if (!apiKey) {
                addSystemMessage('⚠️ 请先在上方输入并保存你的DeepSeek API Key');
                return;
            }
            
            // 添加用户消息
            addMessage(userMessage, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // 添加加载提示
            const loadingId = addLoadingMessage();
            
            // 准备请求
            messages.push({ role: 'user', content: userMessage });
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages,
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || '请求失败');
                }
                
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // 移除加载提示
                removeLoadingMessage(loadingId);
                
                // 添加AI响应
                addMessage(aiResponse, 'ai');
                messages.push({ role: 'assistant', content: aiResponse });
                
            } catch (error) {
                removeLoadingMessage(loadingId);
                addSystemMessage(`❌ 错误：${error.message}`);
                messages.pop(); // 移除失败的用户消息
            }
        }
        
        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type === 'user' ? 'user-message' : 'ai-message'}`;
            
            // 支持换行和Markdown简单渲染
            if (type === 'ai') {
                messageDiv.innerHTML = formatMarkdown(content);
            } else {
                messageDiv.textContent = content;
            }
            
            chatArea.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function addSystemMessage(content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            messageDiv.style.background = '#fff3cd';
            messageDiv.style.color = '#856404';
            messageDiv.textContent = content;
            chatArea.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function addLoadingMessage() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message loading';
            loadingDiv.textContent = '🤔 DeepSeek 思考中...';
            loadingDiv.id = 'loading-' + Date.now();
            chatArea.appendChild(loadingDiv);
            scrollToBottom();
            return loadingDiv.id;
        }
        
        function removeLoadingMessage(id) {
            const loadingDiv = document.getElementById(id);
            if (loadingDiv) loadingDiv.remove();
        }
        
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function formatMarkdown(text) {
            // 简单的Markdown渲染
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code style="background:#e0e0e0;padding:2px 4px;border-radius:4px;">$1</code>')
                .replace(/\n/g, '<br>');
        }
        
        function enableSending(enabled) {
            sendBtn.disabled = !enabled;
            userInput.disabled = !enabled;
        }
        
        // 自动调整textarea高度
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
